<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NoEvento!</title>

    <script src="https://kit.fontawesome.com/b549259b17.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="./css/style.css">

    <script src="./js/script.js" defer></script>
</head>
<body>
    <div class="modal-form">
        <div class="modal-signup">
            <a href="index.html" class="return-index"><i class="fa-solid fa-rotate-left fa-xl"></i></a>
            <h2>Criar Conta</h2>
            <form action="" class="form-signup">
                <label for="first-name">
                    <i class="icon-form-show fa-solid fa-user fa-xl"></i>
                    <input type="text" name="firstName" id="firstName" placeholder="Primeiro Nome">
                </label>

                <label for="last-name">
                    <i class="icon-form-show fa-brands fa-dribbble fa-xl"></i>
                    <input type="text" name="lastName" id="lastName" placeholder="Sobrenome">
                </label>
                
                <label for="email">
                    <i class="icon-form-show fa-solid fa-envelope fa-xl"></i>
                    <input type="email" name="email" id="email" placeholder="E-mail">
                </label>

                <label for="password">
                    <i class="icon-form-show fa-solid fa-lock fa-xl"></i>
                    <input type="password" name="password" id="password" placeholder="Senha">
                    <i class="password-show fa-regular fa-eye-slash fa-xl"></i>
                </label>

                <input type="submit" value="Cadastrar">
            </form>
            <p>Já possui uma conta? <a href="login.html">Acesse aqui!</a></p>
        </div>
    </div>         
</body>
</html>
