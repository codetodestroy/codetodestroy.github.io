<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NoEvento!</title>

    <script src="https://kit.fontawesome.com/b549259b17.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header class="header">
        <div class="header-main">
            <a class="header-title" href="/"><h1>NoEvento!</h1></a>
            <nav class="header-nav">
                <button class="btn-create_event">Criar Evento</button>
                <i class="header-menu fa-solid fa-bars fa-2xl" style="color: #9A1BFF;"></i>
            </nav>
        </div>
        <div class="header-search">
            <i class="fa-solid fa-magnifying-glass fa-xl"></i>
            <input type="search" placeholder="Pesquisar eventos, shows, teatros, cursos...">
        </div>
    </header>

    <main>
        <section class="categories">
            <h2 class="sections-title">Categorias</h2>
            <ul class="categories-list">
                <li class="category">
                    <img class="category-img" src="./img/default-category.svg" alt="Categoria 1">
                    <a class="category-title">Categoria 1</a>
                </li>
                <li class="category">
                    <img class="category-img" src="./img/default-category.svg" alt="Categoria 2">
                    <a class="category-title">Categoria 2</a>
                </li>
                <li class="category">
                    <img class="category-img" src="./img/default-category.svg" alt="Categoria 3">
                    <a class="category-title">Categoria 3</a>
                </li>
                <li class="category">
                    <img class="category-img" src="./img/default-category.svg" alt="Categoria 4">
                    <a class="category-title">Categoria 4</a>
                </li>
                <li class="category">
                    <img class="category-img" src="./img/default-category.svg" alt="Categoria 5">
                    <a class="category-title">Categoria 5</a>
                </li>
            </ul>
        </section>

        <section class="highlights">
            <h2 class="sections-title">Destaques</h2>
            <ul class="highlights-list">
                <li class="highlight">
                    <img class="highlight-img" src="./img/default-highlight.svg" alt="Destaque">
                </li>
                <li class="highlight">
                    <img class="highlight-img" src="./img/default-highlight.svg" alt="Destaque">
                </li>
            </ul>
        </section>
    </main>
</body>
</html>
